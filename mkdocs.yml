site_name: Teranode
site_description: Horizontally scalable BSV blockchain node
site_url: https://bsv-blockchain.github.io/teranode/

# Files inside docs/ that should not be copied into the built site.
# `hooks/` holds the cache-bust build hook (Python, executed at build time
# via the top-level `hooks:` key) — its source and __pycache__ should not
# ship to GitHub Pages.
exclude_docs: |
  hooks/

theme:
  name: material
  logo: assets/bsv-logo.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

repo_name: bsv-blockchain/teranode
