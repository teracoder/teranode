name: Teranode main tests
on:
  workflow_call

env:
  REPO: teranode
  GO_VERSION: '1.26.0'
  # Disable testcontainers' Ryuk reaper sidecar — Docker Hub rate-limits and
  # gateway timeouts pulling testcontainers/ryuk:* are the dominant flake
  # source on CI. Ephemeral runners are torn down regardless, so the reaper
  # provides no value here. Tests already call container.Terminate() explicitly.
  TESTCONTAINERS_RYUK_DISABLED: "true"

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  go-test:
    name: Go test
    # ARM runner (see teranode_pr_tests.yaml): more headroom for the heavy
    # `make test` -race+coverage compile; runs natively on arm64.
    runs-on: teranode-runner-16-core-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Login to Docker Hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ vars.DOCKER_ORG }}
          password: ${{ secrets.DOCKER_ORG_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: "false"

      # Authoritative cache saver: the only job that WRITES the Go caches, and
      # it runs on the default branch — so every PR job can read them back.
      - name: Restore and save Go caches
        uses: ./.github/actions/go-cache
        with:
          # Save only on the default branch. GitHub scopes caches by branch, so
          # only main's cache is readable by every PR. staging/release/tag builds
          # restore but don't write, leaving the 10 GB repo budget to main.
          save: ${{ github.ref == 'refs/heads/main' }}

      - name: Run Go tests
        run: make test
        continue-on-error: false

      # Drop build-cache objects unused for 90+ min before the post-job save,
      # keeping the uploaded tarball under the 10 GB repo cache cap.
      - name: Trim Go build cache
        if: always()
        run: find ~/.cache/go-build -type f -mmin +90 -delete 2>/dev/null || true

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 1


  smoketest:
    name: smoketest
    runs-on: teranode-runner-8-core
    continue-on-error: true
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ vars.DOCKER_ORG }}
          password: ${{ secrets.DOCKER_ORG_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: "false"

      - name: Restore Go caches
        uses: ./.github/actions/go-cache

      - name: Run Smoke tests
        run: make smoketest
        continue-on-error: false
        env:
          settings_context: ${{ env.SETTINGS_CONTEXT_DEFAULT }}

      - name: Upload smoketest results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoketest-results
          path: /tmp/teranode-test-results/smoketest-results.txt
          retention-days: 2

  prunertest:
    name: prunertest
    # arm64: aerospike (8.1, arm64), no SV-node (see teranode_pr_smoketests.yaml).
    runs-on: teranode-runner-8-core-arm
    continue-on-error: true
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ vars.DOCKER_ORG }}
          password: ${{ secrets.DOCKER_ORG_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: "false"

      - name: Restore Go caches
        uses: ./.github/actions/go-cache

      - name: Run Pruner tests
        run: make prunertest
        continue-on-error: false
        env:
          settings_context: ${{ env.SETTINGS_CONTEXT_DEFAULT }}

      - name: Upload prunertest results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prunertest-results
          path: /tmp/teranode-test-results/prunertest-results.txt
          retention-days: 2

  sonarqube:
    name: Sonarqube
    runs-on: teranode-runner-8-core
    needs: go-test
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-report

      - name: Run filename check script
        run: |
          ./scripts/check_filenames.sh

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: "false"

      # golangci typechecks (no -race) and Sonar reads prebuilt reports, so
      # restore the module cache only.
      - name: Restore Go caches
        uses: ./.github/actions/go-cache
        with:
          build_cache: 'false'

      # Re-run golangci-lint separately without exiting on errors and generating a report for use in Sonar
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: latest
          args: --timeout=5m --disable gosec --disable prealloc --issues-exit-code=0 --output.checkstyle.path=golangci-lint-report.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
