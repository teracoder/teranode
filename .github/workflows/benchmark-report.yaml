name: Benchmark Report Comment

on:
  workflow_run:
    workflows: ["Benchmark Comparison"]
    types:
      - completed

jobs:
  comment:
    name: Post Benchmark Report
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Download benchmark report
        uses: actions/download-artifact@v4
        with:
          name: benchmark-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Get the PR associated with this workflow run
            const run = await github.rest.actions.getWorkflowRun({
              ...context.repo,
              run_id: context.payload.workflow_run.id,
            });

            // Search for PRs matching this head SHA
            const { data: prs } = await github.rest.pulls.list({
              ...context.repo,
              head: `${run.data.head_repository.owner.login}:${run.data.head_branch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              console.log('No matching PR found');
              return;
            }

            core.setOutput('number', prs[0].number);
            console.log(`Found PR #${prs[0].number}`);

      - name: Comment on PR
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            if (!fs.existsSync('benchmark-report.md')) {
              console.log('No benchmark report found');
              return;
            }

            const marker = '<!-- benchmark-comparison-report -->';
            const body = marker + '\n' + fs.readFileSync('benchmark-report.md', 'utf8');
            const issue_number = parseInt('${{ steps.pr.outputs.number }}');

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number,
                body,
              });
              console.log(`Created new comment on PR #${issue_number}`);
            }
