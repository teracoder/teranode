name: Teranode PR tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  REPO: teranode
  SETTINGS_CONTEXT_DEFAULT: test
  GO_VERSION: "1.26.0"
  # Disable testcontainers' Ryuk reaper sidecar — Docker Hub rate-limits and
  # gateway timeouts pulling testcontainers/ryuk:* are the dominant flake
  # source on CI. Ephemeral runners are torn down regardless, so the reaper
  # provides no value here. Tests already call container.Terminate() explicitly.
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  golangci-lint:
    name: golangci-lint
    # arm64-safe: pure Go analysis, no containers (golangci-lint ships arm64).
    runs-on: teranode-runner-8-core-arm
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      # golangci typechecks (no -race) and the action caches its own build
      # artifacts, so restore the module cache only.
      - name: Restore Go caches
        uses: ./.github/actions/go-cache
        with:
          build_cache: 'false'

      - name: golangci-lint with checkstyle report
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: v2.10.1
          args: --timeout=5m --disable gosec --disable prealloc --output.checkstyle.path=golangci-lint-report.xml --output.text.path=stdout

      - name: Upload golangci-lint report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: golangci-lint-report
          path: golangci-lint-report.xml
          retention-days: 1

  test:
    name: test
    # TEMPORARY: 32-core/128GB arm to stop intermittent OOM (exit 143). `make test`
    # runs `go test -race -coverpkg=./...` over the whole repo; a few test binaries
    # peak very high (sql ~34G, blockassembly ~31G, subtreeprocessor ~20G) and at
    # -p=16 enough overlap to exhaust a 16-core/64GB runner intermittently. Job-wide
    # peak measured ~110GB+. This is a stopgap until per-package memory is reduced —
    # tracked in #1051. Revert to teranode-runner-16-core-arm once that lands.
    runs-on: teranode-runner-32-core-arm
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      # Only login to Docker Hub for internal PRs to avoid rate limits.
      # Fork PRs won't have access to secrets and will skip this step.
      - name: Login to Docker Hub
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ vars.DOCKER_ORG }}
          password: ${{ secrets.DOCKER_ORG_TOKEN }}

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Restore Go caches
        uses: ./.github/actions/go-cache

      - name: Run Go tests
        # Tracks each test binary's peak RSS (VmHWM — the kernel's monotonic
        # high-water mark) silently in the background, then prints a top-10
        # peak-memory table plus the job-wide peak at the END of the run. Lets us
        # watch unit-test memory come down as #1051 is worked, and justifies the
        # temporary 32-core runner above. No deps; survives a SIGTERM (the summary
        # also runs from the EXIT trap). Sampler runs under `set +e` so a
        # SIGPIPE/no-match can't trip the step's `set -e`; `make test` keeps it.
        run: |
          TRACK="$(mktemp)"
          track() {
            set +e
            local st pid hwm cmd name
            while :; do
              for st in /proc/[0-9]*/status; do
                hwm="$(awk '/^VmHWM:/{print $2; exit}' "$st" 2>/dev/null)"
                [ -n "$hwm" ] || continue
                pid="${st#/proc/}"; pid="${pid%/status}"
                cmd="$(tr '\0' ' ' < "/proc/$pid/cmdline" 2>/dev/null)"
                name="${cmd%% *}"; name="${name##*/}"
                case "$name" in *.test) echo "$hwm $name" >> "$TRACK" ;; esac
              done
              sleep 10
            done
          }
          track & TRACK_PID=$!
          job_peak() {
            local f
            for f in /sys/fs/cgroup/memory.peak /sys/fs/cgroup/memory/memory.max_usage_in_bytes; do
              if [ -r "$f" ]; then awk -v b="$(<"$f")" 'BEGIN{printf "%.1fG", b/1073741824}'; return; fi
            done
            awk '/^MemTotal:/{t=$2} /^MemAvailable:/{a=$2} END{printf "%.1fG",(t-a)/1048576}' /proc/meminfo
          }
          summary() {
            set +e
            kill "$TRACK_PID" 2>/dev/null
            echo "::group::Peak memory  (job peak=$(job_peak))"
            awk '$1>m[$2]{m[$2]=$1} END{for (k in m) printf "%d %s\n", m[k], k}' "$TRACK" 2>/dev/null \
              | sort -rn | head -10 | awk '{printf "PEAKMEM %.1fG %s\n", $1/1048576, $2}'
            echo "::endgroup::"
          }
          trap summary EXIT
          make test
        continue-on-error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 1

      # - name: Publish Test Summary Results
      #   if: always()
      #   run: npx github-actions-ctrf ctrf-report.json

  filename-check-report:
    name: filename check report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Generate filename check report
        run: ./scripts/check_filenames.sh

      - name: Upload filename check report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sonar-filename-report
          path: sonar_filename_report.json
          retention-days: 1

