  miner-1:
    image: curlimages/curl:latest
    profiles:
      - default
    container_name: miner-1
    depends_on:
      - teranode-1
    network_mode: "host"
    volumes:
      - ../compose/scripts/generate-blocks.sh:/generate-blocks.sh
    entrypoint:
      [
        "/generate-blocks.sh",
        "--host",
        "localhost",
        "--port",
        "19292",
        "--generate",
      ]
    restart: unless-stopped

  miner-2:
    image: curlimages/curl:latest
    profiles:
      - default
    container_name: miner-2
    depends_on:
      - teranode-2
    network_mode: "host"
    volumes:
      - ../compose/scripts/generate-blocks.sh:/generate-blocks.sh
    entrypoint:
      [
        "/generate-blocks.sh",
        "--host",
        "localhost",
        "--port",
        "29292",
      ]
    restart: unless-stopped

  miner-3:
    image: curlimages/curl:latest
    profiles:
      - default
    container_name: miner-3
    depends_on:
      - teranode-3
    network_mode: "host"
    volumes:
      - ../compose/scripts/generate-blocks.sh:/generate-blocks.sh
    entrypoint:
      [
        "/generate-blocks.sh",
        "--host",
        "localhost",
        "--port",
        "39292",
      ]
    restart: unless-stopped

  block-generator:
    image: curlimages/curl:latest
    profiles:
      - chainintegrity
    container_name: block-generator
    depends_on:
      - teranode-1
    network_mode: "host"
    volumes:
      - ../compose/scripts/generate-blocks.sh:/generate-blocks.sh
    entrypoint:
      [
        "/generate-blocks.sh",
        "--host",
        "localhost",
        "--port",
        "19292",
        "--generate",
      ]
    restart: unless-stopped

  coinbase-1:
    <<: *teranode-coinbase-base
    # profiles:
    #   - skip
    container_name: coinbase-1
    depends_on:
      - teranode-1
    entrypoint:
      [
        "sh",
        "-c",
        "sleep 10 && exec ./coinbase.run -all=0 -coinbase=1 -faucet=1",
      ]
    environment:
      SETTINGS_CONTEXT: "docker.host.teranode1.coinbase"
      profilerAddr: "localhost:17092"
    volumes:
      - ../settings.conf:/app/settings.conf
      - ../compose/settings_test.conf:/app/settings_local.conf
      - ../data/coinbase1:/app/data

  tx-blaster-1:
    <<: *teranode-coinbase-base
    # profiles:
    #   - skip
    container_name: tx-blaster-1
    depends_on:
      - coinbase-1
      - teranode-1
    environment:
      SETTINGS_CONTEXT: "docker.host.teranode1.coinbase"
      BLASTER_ARGS: "-workers=2"
      profilerAddr: "localhost:17093"
    entrypoint: ["./blaster.run"]
    command:
      ["-workers=1", "-print=0", "-profile=:7092", "-log=0", "-limit=100"]
    volumes:
      - ../settings.conf:/app/settings.conf
      - ../compose/settings_test.conf:/app/settings_local.conf
      - ../data/txblaster1:/app/data
      # - ../data/txblaster.log:/app/data/txblaster.log

  prometheus-1:
    container_name: prometheus-1
    image: prom/prometheus:v2.44.0
    network_mode: "host"
    mem_limit: 64m
    command:
      - "--web.listen-address=:19090"
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ../compose/prometheus/prometheus-host-1.yml:/etc/prometheus/prometheus.yml

  prometheus-2:
    container_name: prometheus-2
    image: prom/prometheus:v2.44.0
    network_mode: "host"
    mem_limit: 64m
    command:
      - "--web.listen-address=:29090"
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ../compose/prometheus/prometheus-host-2.yml:/etc/prometheus/prometheus.yml

  prometheus-3:
    container_name: prometheus-3
    image: prom/prometheus:v2.44.0
    network_mode: "host"
    mem_limit: 64m
    command:
      - "--web.listen-address=:39090"
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ../compose/prometheus/prometheus-host-3.yml:/etc/prometheus/prometheus.yml

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    network_mode: "host"
    volumes:
      - ../compose/grafana/datasources/main-host.yaml:/etc/grafana/provisioning/datasources/main.yaml
      - ../compose/grafana/dashboards/main.yaml:/etc/grafana/provisioning/dashboards/main.yaml
      - ../compose/grafana/dashboards:/var/lib/grafana/dashboards
      - ../compose/grafana/grafana.db:/var/lib/grafana
    depends_on:
      - prometheus-1
      - prometheus-2
      - prometheus-3

  aerospike-1:
    container_name: aerospike-1
    <<: *aerospike-base
    volumes:
      - ./aerospike/aerospike-1.conf:/etc/aerospike.conf
      - ../data/aerospike1/logs:/var/log/aerospike
      - ../data/aerospike1/data:/opt/aerospike/data

  aerospike-2:
    container_name: aerospike-2
    <<: *aerospike-base
    volumes:
      - ./aerospike/aerospike-2.conf:/etc/aerospike.conf
      - ../data/aerospike2/logs:/var/log/aerospike
      - ../data/aerospike2/data:/opt/aerospike/data

  aerospike-3:
    container_name: aerospike-3
    <<: *aerospike-base
    volumes:
      - ./aerospike/aerospike-3.conf:/etc/aerospike.conf
      - ../data/aerospike3/logs:/var/log/aerospike
      - ../data/aerospike3/data:/opt/aerospike/data

  aerospike-exporter-1:
    container_name: aerospike-exporter-1
    image: aerospike/aerospike-prometheus-exporter:latest
    environment:
      AS_HOST: "localhost"
      AS_PORT: "3100"
      AGENT_BIND_PORT: "19145"
      METRIC_LABELS: "type='development',source='aerospike'"
    network_mode: "host"

  aerospike-exporter-2:
    container_name: aerospike-exporter-2
    image: aerospike/aerospike-prometheus-exporter:latest
    environment:
      AS_HOST: "localhost"
      AS_PORT: "3200"
      AGENT_BIND_PORT: "29145"
      METRIC_LABELS: "type='development',source='aerospike'"
    network_mode: "host"

  aerospike-exporter-3:
    container_name: aerospike-exporter-3
    image: aerospike/aerospike-prometheus-exporter:latest
    environment:
      AS_HOST: "localhost"
      AS_PORT: "3300"
      AGENT_BIND_PORT: "39145"
      METRIC_LABELS: "type='development',source='aerospike'"
    network_mode: "host"
