/*
validator_api.proto defines the gRPC service interface for the BSV Blockchain transaction
validation service. It specifies the methods and message types for transaction
validation, health checking, and block information retrieval.
*/

syntax = "proto3";

option go_package = "./;validator_api";

package validator_api;

import "google/protobuf/timestamp.proto";

import "errors/error.proto";

// ValidatorAPI service provides methods for transaction validation and related operations
service ValidatorAPI {
  // HealthGRPC checks the health status of the validation service
  // Returns detailed health information including service status and timestamp
  rpc HealthGRPC (EmptyMessage) returns (HealthResponse) {}

  // ValidateTransaction validates a single transaction
  // Performs comprehensive validation including script verification and UTXO checks
  rpc ValidateTransaction(ValidateTransactionRequest) returns (ValidateTransactionResponse) {}

  // ValidateTransactionBatch validates multiple transactions in a single request
  // Provides efficient batch processing of transactions
  rpc ValidateTransactionBatch(ValidateTransactionBatchRequest) returns (ValidateTransactionBatchResponse) {}

  // GetBlockHeight retrieves the current block height
  // Used for validation context and protocol upgrade determination
  rpc GetBlockHeight(EmptyMessage) returns (GetBlockHeightResponse) {}

  // GetMedianBlockTime retrieves the median time of recent blocks
  // Used for time-based validation rules
  rpc GetMedianBlockTime(EmptyMessage) returns (GetMedianBlockTimeResponse) {}
}


// EmptyMessage represents an empty request message
// Used for endpoints that don't require input parameters
// swagger:model EmptyMessage
message EmptyMessage {}

// HealthResponse provides health check information
// swagger:model HealthResponse
message HealthResponse {
  bool ok = 1;                                    // Overall health status
  string details = 2;                            // Detailed health information
  google.protobuf.Timestamp timestamp = 3;       // Timestamp of health check
}

// ValidateTransactionRequest contains data for transaction validation
// swagger:model ValidateTransactionRequest
message ValidateTransactionRequest {
  bytes transaction_data = 1;    // Raw transaction data to validate
  uint32 block_height = 2;       // Block height for validation context
  // validation options
  optional bool skip_utxo_creation = 3;     // Skip UTXO creation for validation
  optional bool add_tx_to_block_assembly = 4; // Add transaction to block assembly
  optional bool skip_policy_checks = 5;     // Skip policy checks
  optional bool create_conflicting = 6;     // Create conflicting transaction
  optional bool skip_txmeta_publishing = 7; // Skip publishing txmeta to Kafka
  optional uint32 candidate_block_time = 8; // Candidate block header timestamp; consumed by the server for pre-CSV block-validation finality. Sender omits when not running block-context validation.
  optional uint32 candidate_parent_median_time = 9; // Candidate-parent MTP (equivalent to bitcoin-sv's pindexPrev->GetMedianTimePast()); consumed by the server for post-CSV block-validation finality. REQUIRED on every post-CSV consensus request — selectFinalityComparisonTime returns a ProcessingError when this field is missing. The server provides no tip-MTP soft-fall because blockState.MedianTime is updated asynchronously from blockchain notifications and would race with tip advance / reorg during validation.
  repeated ParentTxMetadata parent_metadata = 10; // Per in-block parent metadata: parent tx hash + block height (the candidate block height at the time the metadata was built). Empty when not running in block-validation context. The validator consults this map BEFORE the UTXO store fallback: when a parent appears here, the height is set from this entry and the UTXO-store BlockHeights branch is bypassed — this is what prevents the unconfirmedParentHeight sentinel from clobbering a legitimate in-block parent. Senders pass only the entries the current tx's inputs reference (per-tx filtering), not the full block-scoped accumulator.
}

// ParentTxMetadata carries the (parent hash, block height) pair used by the
// validator's in-block-parent height-resolution path. parent_hash is the
// chainhash.Hash internal byte order (32 bytes), passed as-is — no hex
// encoding, no display-order conversion. Internal-order bytes round-trip
// directly between client and server with no encoding step.
message ParentTxMetadata {
  bytes parent_hash = 1;     // chainhash.Hash internal byte order (32 bytes).
  uint32 block_height = 2;   // Block height stamped at metadata-build time.
}

// ValidateTransactionResponse provides transaction validation results
// swagger:model ValidateTransactionResponse
message ValidateTransactionResponse {
  bool valid = 1;        // Validation result (true if valid)
  bytes txid = 2;        // Transaction ID of the validated transaction
  string reason = 3;     // Reason for rejection if invalid
  bytes metadata = 4;    // Additional metadata for the transaction
}

// ValidateTransactionBatchRequest contains multiple transactions for batch validation
// swagger:model ValidateTransactionBatchRequest
message ValidateTransactionBatchRequest {
  repeated ValidateTransactionRequest transactions = 1;    // Array of transactions to validate
}

// ValidateTransactionBatchResponse provides batch validation results
// swagger:model ValidateTransactionBatchResponse
message ValidateTransactionBatchResponse {
  bool valid = 1;                    // Always true; callers must inspect per-item errors below.
  repeated errors.TError errors = 2;        // Array of error messages, one per transaction
  repeated bytes metadata = 3;       // Array of metadata for each transaction
}

// GetBlockHeightResponse provides the current block height
// swagger:model GetBlockHeightResponse
message GetBlockHeightResponse {
  uint32 height = 1;                  // Current block height
}

// GetMedianBlockTimeResponse provides the median time of recent blocks
// swagger:model GetMedianBlockTimeResponse
message GetMedianBlockTimeResponse {
  uint32 median_time = 1;             // Median time of recent blocks
}
