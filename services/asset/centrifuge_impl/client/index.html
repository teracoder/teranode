<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Teranode centrifuge client tester</title>
    <style>
        input[type="text"] { width: 300px; }
        #messages {
            white-space: pre;
        }
    </style>
    <script type="text/javascript">
      window.addEventListener('load', function() {
        let clientID;
        let unsubscribed = false;
        let reconnect = true;
        let numFailures = 0;

        const baseURL = "localhost:8892"

        function connect() {
          const ws = new WebSocket('ws://' + baseURL + '/connection/websocket');

          ws.onopen = function(e) {
            numFailures = 0;
            console.log("websocket: connection open");
            console.log(e);
            // Centrifuge bidirectional connect command. Server's OnConnecting
            // handler auto-subscribes us to the standard channels.
            ws.send(JSON.stringify({ id: 1, connect: {} }));
          };

          ws.onerror = function(e) {
            numFailures++;
            console.log(e);
            drawText("✋ websocket: connection error, see console");
          };

          ws.onclose = function (e) {
            if (!reconnect) {
              return;
            }
            setTimeout(function () {
              drawText("🙏🏾 websocket: connection reconnecting");
              connect();
            }, Math.min(numFailures * 1000, 20000));
          }

          ws.onmessage = function(e) {
            console.log("websocket: new message");
            console.log(e);
            processData(e.data);
          };
        }

        connect();

        function processData(rawData) {
          if (rawData === "{}") {
            drawText("--> ping");
            return
          }
          //drawText("--> " + rawData);
          const data = JSON.parse(rawData);
          // Command-reply envelopes carry the result as a sibling of the
          // command id; the connect-reply is the only one we issue.
          if (data.connect) {
            clientID = data.connect.client;
            let subscriptions = [];
            const subs = data.connect.subs;
            if (subs) {
              for (const m in subs) {
                if (subs.hasOwnProperty(m)) {
                  subscriptions.push(m);
                }
              }
            }
            drawText("🟢 connected with client ID " + clientID + " and subscriptions: " + JSON.stringify(subscriptions));
            return;
          }
          // Everything server-initiated is wrapped in a push envelope.
          const push = data.push;
          if (!push) {
            drawText("😟 unsupported frame " + JSON.stringify(data));
            return;
          }
          if (push.disconnect) {
            clientID = null;
            drawText("🔴 disconnected from a server");
            const code = push.disconnect.code;
            reconnect = !((code >= 3500 && code < 4000) || (code >= 4500 && code < 5000));
          } else if (push.unsubscribe) {
            drawText("🔓 unsubscribed from a channel " + push.channel);
          } else if (push.subscribe) {
            drawText("🔒 subscribed to a channel " + push.channel);
          } else if (push.pub) {
            drawText("✨ new data from a channel " + push.channel + ": " + JSON.stringify(push.pub, null, 2));
          } else {
            drawText("😟 unsupported push type " + JSON.stringify(push));
          }
        }

        const container = document.getElementById('messages');

        function drawText(text) {
          let e = document.createElement('li');
          e.textContent = [
            (new Date()).toLocaleString('en-UK'),
            ' ' + text
          ].join('\n');
          container.insertBefore(e, container.firstChild);
        }

        window.addEventListener('click', function () {
          // Every click changes status of subscription fetching backend endpoints
          // with current client ID.
          if (unsubscribed) {
            fetch('http://' +baseURL + '/subscribe?client=' + clientID);
          } else {
            fetch('http://' +baseURL + '/unsubscribe?client=' + clientID);
          }
          unsubscribed = !unsubscribed;
        });
      });
    </script>
</head>
<body>
<ul id="messages"></ul>
</body>
</html>
